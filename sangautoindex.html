<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANG PRO AUTO - LUXURY SHOWROOM</title>
<link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CSS VARIABLES & RESET
           ========================================= */
        :root {
            --primary: #000000;
            --accent: #e31b23;
            --bg: #f4f6f9;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }

        html, body { 
            overflow-x: hidden; 
            width: 100%;
            font-family: 'Lexend', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 90px; 
            line-height: 1.6; 
            scroll-behavior: smooth;
        }
        
        /* =========================================
           2. HEADER & LAYOUT
           ========================================= */
        header { 
            background: var(--primary); 
            color: var(--white); 
            padding: 16px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: var(--shadow-md); 
            width: 100%; 
        }
        .logo-text { 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-align: center; 
            text-transform: uppercase; 
        }
        .container { 
            width: 100%; 
            max-width: 1000px; 
            margin: auto; 
            padding: 0 12px; 
        }

        /* =========================================
           3. BỘ LỌC SHOWROOM (FILTER)
           ========================================= */
        .filter-section { 
            background: var(--white); 
            padding: 15px; 
            border-radius: var(--radius-lg); 
            margin: 20px 0; 
            box-shadow: var(--shadow-sm); 
            border: 1px solid var(--border);
        }
        .search-wrapper { 
            position: relative; 
            margin-bottom: 12px; 
        }
        .search-wrapper input { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            font-size: 15px; 
            outline: none; 
            transition: all 0.3s; 
            font-family: inherit;
        }
        .search-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }
        .search-wrapper i { 
            position: absolute; 
            left: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-sub); 
            font-size: 16px;
        }
        .grid-filters { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }
        .sel-custom { 
            padding: 12px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            background: #f8fafc; 
            font-size: 14px; 
            cursor: pointer; 
            width: 100%; 
            font-family: inherit;
            color: var(--text-main);
            outline: none;
        }
        .sel-custom:focus { border-color: var(--text-sub); }

        /* =========================================
           4. DANH SÁCH XE (GRID SHOWROOM)
           ========================================= */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-top: 15px; 
        }
        @media (max-width: 350px) { .main-grid { grid-template-columns: 1fr; } }
        
        .car-card { 
            background: var(--white); 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            border: 1px solid var(--border); 
            transition: all 0.3s ease; 
            cursor: pointer; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--shadow-sm);
        }
        .car-card:active { transform: scale(0.98); }
        
        .hot-label { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: linear-gradient(45deg, #ff8a00, #e52e71); 
            color: #fff; 
            padding: 4px 10px; 
            border-radius: 30px; 
            font-size: 10px; 
            font-weight: 700; 
            z-index: 10; 
            box-shadow: 0 4px 10px rgba(229, 46, 113, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .img-wrap { 
            width: 100%; 
            aspect-ratio: 4/3; 
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            overflow: hidden; 
            position: relative;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .img-wrap img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.3s; 
            opacity: 1; 
        }

        .info-wrap { 
            padding: 12px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .name-txt { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 6px; 
            height: 40px; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            line-height: 1.4; 
        }
        .price-txt { 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--accent); 
            margin-bottom: 10px; 
        }
        .spec-tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            border-top: 1px solid #f1f5f9; 
            padding-top: 10px; 
            margin-top: auto; 
        }
        .tag-item { 
            background: #f8fafc; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            color: var(--text-sub); 
            font-weight: 500;
            border: 1px solid var(--border);
        }

        /* =========================================
           5. TRANG CHI TIẾT (DETAIL OVERLAY)
           ========================================= */
        .full-page { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 2000; 
            display: none; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .close-circle { 
            position: fixed; 
            top: 15px; right: 15px; 
            z-index: 2100; 
            background: rgba(0,0,0,0.6); 
            color: #fff; 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            border: none; 
            font-size: 20px; 
            cursor: pointer; 
            backdrop-filter: blur(5px); 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.3s;
        }
        
        .slider-container { 
            width: 100%; 
            aspect-ratio: 4/3; 
            background: #000; 
            position: relative; 
            overflow: hidden; 
            touch-action: pan-y; 
        }
        .slider-track { 
            display: flex; 
            height: 100%; 
            transition: transform 0.3s ease-out; 
            will-change: transform; 
        }
        .slide-img { 
            min-width: 100%; 
            height: 100%; 
            object-fit: cover; 
            pointer-events: none; 
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: white;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }
        .slider-btn.left { left: 10px; }
        .slider-btn.right { right: 10px; }
        .slide-counter-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }

        .detail-body { 
            width: 100%; 
            max-width: 800px; 
            margin: -20px auto 0; 
            position: relative; 
            z-index: 5; 
            padding: 0 12px 120px; 
        }
        .main-info-card { 
            background: #fff; 
            padding: 20px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-lg); 
        }
        .feature-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin: 20px 0; 
        }
        .f-item { 
            background: #f8fafc; 
            padding: 12px 6px; 
            border-radius: var(--radius-md); 
            text-align: center; 
            border: 1px solid var(--border);
        }
        .f-item span { font-size: 10px; color: var(--text-sub); display: block; margin-bottom: 4px; }
        .f-item b { font-size: 14px; display: block; color: var(--text-main); }

        .bank-luxury { 
            background: #fff8f8; 
            border: 1px solid #ffe3e3; 
            padding: 15px; 
            border-radius: var(--radius-md); 
            margin: 20px 0; 
            border-left: 4px solid var(--accent); 
        }
        .contact-group { 
            display: flex; 
            gap: 12px; 
            position: fixed; 
            bottom: 20px; 
            left: 12px; 
            right: 12px; 
            z-index: 100; 
            max-width: 776px;
            margin: 0 auto;
        }
        .c-btn { 
            flex: 1; 
            padding: 14px; 
            border-radius: var(--radius-lg); 
            text-align: center; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            box-shadow: var(--shadow-md); 
        }
        .zalo-bg { background: #0068ff; color: #fff; }
        .call-bg { background: var(--primary); color: #fff; }

        /* =========================================
           6. CỬA HÀNG / QUẢN LÝ (ADMIN VIEW)
           ========================================= */
        .admin-view { display: none; padding-top: 20px; width: 100%; }
        .form-luxury { 
            background: #fff; 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); 
            margin-bottom: 30px; 
        }
        .admin-item { 
            background: #fff; 
            padding: 12px; 
            border-radius: var(--radius-lg); 
            margin-bottom: 12px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            border: 1px solid var(--border); 
        }
        .ad-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; }
        .ad-actions { display: flex; gap: 8px; margin-top: 8px; }
        .ad-btn { padding: 6px 12px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-edit { background: #e2e8f0; color: #1e293b; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-copy { background: #dcfce7; color: #16a34a; }

        /* =========================================
           7. BOTTOM NAVIGATION
           ========================================= */
        .b-nav { 
            position: fixed; 
            bottom: 0; left: 0; 
            width: 100%; height: 70px; 
            background: #fff; 
            display: flex; 
            border-top: 1px solid var(--border); 
            z-index: 1000; 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        .b-link { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 11px; 
        }
        .b-link.active { color: var(--primary); font-weight: 700; }
        .b-link i { font-size: 22px; margin-bottom: 4px; }

        #auth-gate { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 3000; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #fff; 
        }

        @media (min-width: 600px) {
            .main-grid { grid-template-columns: repeat(3, 1fr); }
            .grid-filters { grid-template-columns: repeat(4, 1fr); }
        }

        /* =========================================
           8. CÔNG CỤ TÍNH LÃI SUẤT (CẬP NHẬT)
           ========================================= */
        .calc-toggle-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
            width: 100%; /* Đã sửa thành 100% để dễ thấy trên mobile */
            text-transform: uppercase;
        }
        #calc-section {
            background: #f8fafc;
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            display: none; 
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .calc-result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 12px;
        }
        .calc-result-table th { background: #e2e8f0; text-align: left; padding: 8px; }
        .calc-result-table td { padding: 8px; border-bottom: 1px solid var(--border); }
        .highlight-calc { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">SANG PRO AUTO</div>
</header>

<div id="showroom-tab" class="container">
    <div class="filter-section">
        
        <button class="calc-toggle-btn" onclick="toggleCalc()">
            <i class="fa-solid fa-calculator"></i> CÔNG CỤ TÍNH TRẢ GÓP
        </button>

        <div id="calc-section">
            <h4 style="font-size: 13px; margin-bottom: 10px; text-transform: uppercase; color: var(--primary);">Dự toán khoản vay trả góp</h4>
            <div class="grid-filters">
                <div>
                    <label style="font-size: 10px; color: var(--text-sub);">Giá xe (VNĐ)</label>
                    <input type="number" id="loan-price" placeholder="745,000,000" class="sel-custom">
                </div>
                <div>
                    <label style="font-size: 10px; color: var(--text-sub);">Vay (%)</label>
                    <input type="number" id="loan-pct" placeholder="70" class="sel-custom">
                </div>
                <div>
                    <label style="font-size: 10px; color: var(--text-sub);">Năm</label>
                    <input type="number" id="loan-years" placeholder="5" class="sel-custom">
                </div>
                <div>
                    <label style="font-size: 10px; color: var(--text-sub);">Lãi %/năm</label>
                    <input type="number" id="loan-rate" placeholder="10.5" class="sel-custom">
                </div>
            </div>
            
            <label style="display:flex; align-items:center; gap:8px; font-size:12px; margin: 12px 0; cursor:pointer;">
                <input type="checkbox" id="tpbank-sim" style="width:16px; height:16px;"> 
                Mô phỏng lãi TPBank (10 năm gần nhất)
            </label>

            <button onclick="calculateLoan()" style="width:100%; background:var(--primary); color:#fff; border:none; padding:12px; border-radius:var(--radius-md); font-weight:700; cursor:pointer;">TÍNH TOÁN KẾT QUẢ</button>

            <div id="loan-result-box" style="display:none; margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
                <div id="loan-summary" style="background:#fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border);"></div>
                <div style="overflow-x: auto;">
                    <table class="calc-result-table">
                        <thead>
                            <tr>
                                <th>Năm</th>
                                <th>Gốc+Lãi/Tháng</th>
                                <th>Cao nhất</th>
                            </tr>
                        </thead>
                        <tbody id="loan-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="sr-search" placeholder="Tìm xe (VD: Mazda 3, Xpander)..." onkeyup="processFilter()">
        </div>
        <div class="grid-filters">
            <select id="f-brand" class="sel-custom" onchange="processFilter()"><option value="">Tất cả Hãng</option></select>
            <select id="f-year" class="sel-custom" onchange="processFilter()"><option value="">Năm SX</option></select>
            <select id="f-price" class="sel-custom" onchange="processFilter()">
                <option value="">Khoảng giá</option>
                <option value="0-500">Dưới 500 Tr</option>
                <option value="500-1000">500 Tr - 1 Tỷ</option>
                <option value="1000-9999">Trên 1 Tỷ</option>
            </select>
            <button onclick="location.reload()" class="sel-custom" style="background:var(--accent); color:#fff; border:none; font-weight: 600;">Làm mới</button>
        </div>
    </div>

    <div class="main-grid" id="showroom-render"></div>
</div>

<div id="admin-tab" class="container admin-view">
    <div class="form-luxury">
        <h3 id="ad-title" style="margin:0 0 20px 0; font-size: 16px; border-left: 4px solid var(--primary); padding-left: 10px; text-transform: uppercase;">Đăng Xe Mới</h3>
        <input type="hidden" id="edit-id">
        <div class="grid-filters">
            <input type="text" id="ad-name" placeholder="Tên xe đầy đủ" class="sel-custom" style="grid-column: span 2;">
            <input type="number" id="ad-price" placeholder="Giá bán (VNĐ)" class="sel-custom">
            <input type="text" id="ad-brand" placeholder="Hãng xe" class="sel-custom">
            <input type="number" id="ad-year" placeholder="Năm sản xuất" class="sel-custom">
            <input type="number" id="ad-odo" placeholder="Số Km đã đi" class="sel-custom">
            <select id="ad-status" class="sel-custom" style="grid-column: span 2;">
                <option value="available">Tình trạng: Đang bán</option>
                <option value="deposit">Tình trạng: Đã nhận cọc</option>
                <option value="sold">Tình trạng: Đã bán</option>
            </select>
        </div>
        <h4 style="font-size: 13px; margin: 20px 0 10px; color: var(--text-sub);">HỖ TRỢ NGÂN HÀNG</h4>
        <div class="grid-filters">
            <input type="number" id="ad-bankp" placeholder="Vay tối đa (%)" class="sel-custom">
            <input type="number" id="ad-banky" placeholder="Thời hạn vay (Năm)" class="sel-custom">
            <input type="number" id="ad-bankmin" placeholder="Trả trước tối thiểu (VNĐ)" class="sel-custom" style="grid-column: span 2;">
        </div>
        <label style="display:flex; align-items:center; gap:10px; font-weight:600; font-size:14px; margin: 20px 0; padding: 10px; background: #fff7ed; border-radius: 8px; border: 1px solid #fed7aa;">
            <input type="checkbox" id="ad-hot" style="width:20px; height:20px; accent-color: #ea580c;"> ƯU TIÊN HIỂN THỊ XE HOT 🔥
        </label>
        <textarea id="ad-desc" placeholder="Mô tả tình trạng xe..." class="sel-custom" style="height:100px; margin-bottom:15px;"></textarea>
        <div style="margin-bottom:20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px dashed var(--border);">
            <input type="file" id="ad-files" multiple accept="image/*" class="sel-custom">
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="saveCar()" id="btn-submit" style="flex:2; background:var(--primary); color:#fff; padding:15px; border:none; border-radius:var(--radius-md); font-weight:700; cursor: pointer;">CẬP NHẬT XE</button>
            <button onclick="clearForm()" style="flex:1; background:#f1f5f9; border:none; border-radius:var(--radius-md); cursor: pointer;">LÀM LẠI</button>
        </div>
    </div>
    <div id="admin-render"></div>
</div>

<div id="detail-overlay" class="full-page">
    <button class="close-circle" onclick="closePage()"><i class="fa-solid fa-xmark"></i></button>
    <div id="detail-render-box"></div>
</div>

<div id="auth-gate">
    <div style="background: #fff; padding: 30px; border-radius: 20px; text-align: center; color: var(--text-main); width: 90%; max-width: 350px;">
        <h3 style="margin-bottom: 20px;">MÃ PIN TRUY CẬP</h3>
        <input type="password" id="pin-code" style="background:#f1f5f9; border:1px solid #cbd5e1; border-radius: 10px; font-size:30px; text-align:center; width:100%; padding: 10px; outline:none; letter-spacing:8px; margin-bottom: 20px;" maxlength="4" inputmode="numeric">
        <button onclick="checkAuth()" style="background:var(--primary); color:#fff; padding:15px; width: 100%; border:none; border-radius:10px; font-weight:700;">ĐĂNG NHẬP</button>
    </div>
</div>

<nav class="b-nav">
    <div class="b-link active" id="n-sr" onclick="switchView('showroom')">
        <i class="fa-solid fa-car-side"></i><span>Showroom</span>
    </div>
    <div class="b-link" id="n-ad" onclick="switchView('admin')">
        <i class="fa-solid fa-toolbox"></i><span>Quản lý</span>
    </div>
</nav>

<script>
    /* FIREBASE CONFIG */
    const firebaseConfig = {
        apiKey: "AIzaSyA0oquSskSYpyQusTZMFiqTLIE9jZcEaTY",

    /* LOGIC TÍNH TOÁN LÃI SUẤT */
    function toggleCalc() {

    function calculateLoan() {
        const price = Number(document.getElementById('loan-price').value) || 0;
        const pct = Number(document.getElementById('loan-pct').value) || 0;
        const years = Number(document.getElementById('loan-years').value) || 0;
        let rateInput = Number(document.getElementById('loan-rate').value) || 0;
        const isSimTP = document.getElementById('tpbank-sim').checked;

        if (price === 0 || pct === 0 || years === 0) {
            alert("Vui lòng nhập đầy đủ Giá xe, % Vay và Thời hạn!");
            return;
        }

        const loanAmount = price * (pct / 100);
        const prepayment = price - loanAmount;
        const totalMonths = years * 12;
        const monthlyPrincipal = loanAmount / totalMonths;
        const tpRates = [8.5, 9.0, 10.0, 10.5, 8.0, 7.5, 12.0, 13.5, 10.5, 10.0];

        let tableBody = "";
        let currentBalance = loanAmount;
        let grandTotalInterest = 0;

        for (let y = 1; y <= years; y++) {
            let yearPayments = [];
            let annualRate = (isSimTP && y <= tpRates.length) ? tpRates[y-1] : rateInput;
            for (let m = 1; m <= 12; m++) {
                let monthlyInterest = (currentBalance * (annualRate / 100)) / 12;
                yearPayments.push(monthlyPrincipal + monthlyInterest);
                currentBalance -= monthlyPrincipal;
                grandTotalInterest += monthlyInterest;
            }
            const maxM = Math.max(...yearPayments);
            const avgM = yearPayments.reduce((a,b)=>a+b,0)/12;

            tableBody += `<tr><td>Năm ${y} <br><small>${annualRate}%</small></td><td><b>${formatCurrency(avgM)}</b></td><td>${formatCurrency(maxM)}</td></tr>`;
        }

        document.getElementById('loan-summary').innerHTML = `
            <p>Trả trước: <b>${formatCurrency(prepayment)}</b></p>
            <p>Gốc vay: <b>${formatCurrency(loanAmount)}</b></p>
            <p>Tổng lãi dự kiến: <b style="color:red">${formatCurrency(grandTotalInterest)}</b></p>
        `;
        document.getElementById('loan-table-body').innerHTML = tableBody;
        document.getElementById('loan-result-box').style.display = 'block';
    }

    function formatCurrency(num) { return new Intl.NumberFormat('vi-VN').format(Math.round(num)) + ' đ'; }

    /* CORE FUNCTIONS GIỮ NGUYÊN */
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 1200; 
                    if(w > h) { if(w > max) { h *= max/w; w = max; } }
                    else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(b => resolve(new File([b], file.name, {type:'image/jpeg'})), 'image/jpeg', 0.7);
                };
            };
        });
    }

    function initData() {
        db.collection("Cars").orderBy("updatedAt", "desc").onSnapshot(snap => {
            allCars = [];
            snap.forEach(doc => allCars.push({id: doc.id, ...doc.data()}));
            populateFilters();
            processFilter();
            if(document.getElementById('admin-tab').style.display === 'block') renderAdmin();
            if (!initialLoadDone) {
                initialLoadDone = true;
                const qId = new URLSearchParams(window.location.search).get('id');
                if(qId) setTimeout(() => openPage(qId), 500);
            }
        });
    }

    function populateFilters() {
        const bSet = [...new Set(allCars.map(c => c.brand).filter(Boolean))].sort();
        const ySet = [...new Set(allCars.map(c => c.year).filter(Boolean))].sort((a,b)=>b-a);
        const bSel = document.getElementById('f-brand');
        const ySel = document.getElementById('f-year');
        bSel.innerHTML = '<option value="">Tất cả Hãng</option>';
        bSet.forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
        ySel.innerHTML = '<option value="">Năm SX</option>';
        ySet.forEach(y => ySel.innerHTML += `<option value="${y}">${y}</option>`);
    }

    function processFilter() {
        const kw = document.getElementById('sr-search').value.toLowerCase();
        const br = document.getElementById('f-brand').value;
        const ye = document.getElementById('f-year').value;
        const pr = document.getElementById('f-price').value;
        const filtered = allCars.filter(c => {
            const mKw = !kw || (c.name && c.name.toLowerCase().includes(kw));
            const mBr = !br || c.brand === br;
            const mYe = !ye || String(c.year) === String(ye);
            let mPr = true;
            if(pr === '0-500') mPr = c.price < 500000000;
            if(pr === '500-1000') mPr = c.price >= 500000000 && c.price <= 1000000000;
            if(pr === '1000-9999') mPr = c.price > 1000000000;
            return mKw && mBr && mYe && mPr;
        }).sort((a, b) => (b.isHot === true) - (a.isHot === true));

        const r = document.getElementById('showroom-render'); 
        r.innerHTML = filtered.length ? "" : `<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #64748b;">Không có xe phù hợp.</div>`;
        filtered.forEach(c => {
            const thumb = (c.images && c.images.length > 0) ? c.images[0] : 'https://via.placeholder.com/400x300?text=Chưa+Có+Ảnh';
            r.innerHTML += `
                <div class="car-card" onclick="openPage('${c.id}')">
                    ${c.isHot ? '<div class="hot-label">HOT 🔥</div>' : ''}
                    <div class="img-wrap"><img src="${thumb}"></div>
                    <div class="info-wrap">
                        <div class="name-txt">${c.name || 'Đang cập nhật'}</div>
                        <div class="price-txt">${c.price ? formatCurrency(c.price) : 'Liên hệ'}</div>
                        <div class="spec-tags">
                            <div class="tag-item">${c.year || '--'}</div>
                            <div class="tag-item">${c.odo ? new Intl.NumberFormat('vi-VN').format(c.odo) : '--'} km</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openPage(id) {
        const c = allCars.find(x => x.id === id);
        if(!c) return;
        const imgs = (c.images && c.images.length > 0) ? c.images : ['https://via.placeholder.com/800x600?text=Chưa+Cập+Nhật+Ảnh'];
        totalSlides = imgs.length; currentSlideIndex = 0; 
        let slideHtml = imgs.map(img => `<img src="${img}" class="slide-img">`).join('');
        
        document.getElementById('detail-render-box').innerHTML = `
            <div class="slider-container" id="slider-touch-area">
                ${totalSlides > 1 ? `
                <button class="slider-btn left" onclick="changeSlide(-1, event)"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="slider-btn right" onclick="changeSlide(1, event)"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="slide-counter-badge" id="slide-counter">1 / ${totalSlides}</div>` : ''}
                <div class="slider-track" id="track-box">${slideHtml}</div>
            </div>
            <div class="detail-body">
                <div class="main-info-card">
                    <h2 style="font-size:18px">${c.name}</h2>
                    <h3 style="color:red; margin:10px 0">${c.price ? formatCurrency(c.price) : 'Liên hệ'}</h3>
                    <div class="feature-grid">
                        <div class="f-item"><span>Năm SX</span><b>${c.year || '--'}</b></div>
                        <div class="f-item"><span>Odo</span><b>${c.odo || '--'}</b></div>
                        <div class="f-item"><span>Hãng</span><b>${c.brand || '--'}</b></div>
                    </div>
                    ${(c.bankP || c.bankMin) ? `<div class="bank-luxury"><h4>Hỗ Trợ Vay</h4><p>Vay tối đa: ${c.bankP || '--'}%</p><p>Đưa trước: ${c.bankMin ? formatCurrency(c.bankMin) : '--'}</p></div>` : ''}
                    <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px">
                        <p style="white-space:pre-line; font-size:14px">${c.desc || 'Chưa có mô tả.'}</p>
                    </div>
                </div>
            </div>
            <div class="contact-group">
                <a href="tel:${PHONE_NUMBER}" class="c-btn call-bg">GỌI NGAY</a>
                <a href="${ZALO_LINK}" target="_blank" class="c-btn zalo-bg">ZALO</a>
            </div>
        `;
        document.getElementById('detail-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closePage() { document.getElementById('detail-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function changeSlide(dir, ev) { if(ev) ev.stopPropagation(); currentSlideIndex=(currentSlideIndex+dir+totalSlides)%totalSlides; updateSliderDOM(); }
    function updateSliderDOM() { 
        const track = document.getElementById('track-box'); if(track) track.style.transform = `translateX(-${currentSlideIndex*100}%)`;
        const count = document.getElementById('slide-counter'); if(count) count.innerText = `${currentSlideIndex+1} / ${totalSlides}`;
    }

    function renderAdmin() {
        const r = document.getElementById('admin-render'); r.innerHTML = "";
        allCars.forEach(c => {
            const thumb = (c.images && c.images.length > 0) ? c.images[0] : 'https://via.placeholder.com/80x60';
            r.innerHTML += `<div class="admin-item"><img src="${thumb}" class="ad-thumb"><div style="flex:1"><b>${c.name}</b><br><span style="color:red">${formatCurrency(c.price || 0)}</span><div class="ad-actions"><button class="ad-btn btn-edit" onclick="editMode('${c.id}')">Sửa</button><button class="ad-btn btn-del" onclick="deleteCar('${c.id}')">Xóa</button></div></div></div>`;
        });
    }

    async function saveCar() {
        const id = document.getElementById('edit-id').value;
        const btn = document.getElementById('btn-submit');
        const files = document.getElementById('ad-files').files;
        if(!document.getElementById('ad-name').value) return alert("Nhập tên xe!");
        btn.disabled = true; btn.innerText = "ĐANG TẢI...";
        const payload = {
            name: document.getElementById('ad-name').value,
            price: Number(document.getElementById('ad-price').value),
            brand: document.getElementById('ad-brand').value,
            year: document.getElementById('ad-year').value,
            odo: document.getElementById('ad-odo').value,
            status: document.getElementById('ad-status').value,
            bankP: document.getElementById('ad-bankp').value,
            bankY: document.getElementById('ad-banky').value,
            bankMin: document.getElementById('ad-bankmin').value,
            isHot: document.getElementById('ad-hot').checked,
            desc: document.getElementById('ad-desc').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            if(files.length > 0) {
                let urls = [];
                for(let f of files) {
                    const comp = await compressImage(f);
                    const fd = new FormData(); fd.append("image", comp);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
                    const d = await res.json(); if(d.data) urls.push(d.data.url);
                }
                payload.images = urls;
            }
            if(id) await db.collection("Cars").doc(id).update(payload);
            else await db.collection("Cars").add({...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
            alert("Thành công!"); clearForm();
        } catch(e) { alert("Lỗi: " + e.message); } finally { btn.disabled = false; btn.innerText = "CẬP NHẬT XE"; }
    }

    function editMode(id) {
        const c = allCars.find(x => x.id === id); if(!c) return;
        document.getElementById('edit-id').value = c.id;
        document.getElementById('ad-name').value = c.name;
        document.getElementById('ad-price').value = c.price;
        document.getElementById('ad-brand').value = c.brand;
        document.getElementById('ad-year').value = c.year;
        document.getElementById('ad-odo').value = c.odo;
        document.getElementById('ad-hot').checked = c.isHot;
        document.getElementById('ad-desc').value = c.desc;
        window.scrollTo(0,0);
    }

    async function deleteCar(id) { if(confirm("Xóa xe này?")) await db.collection("Cars").doc(id).delete(); }
    function clearForm() { document.getElementById('edit-id').value = ""; document.querySelectorAll('.form-luxury input, .form-luxury textarea').forEach(i => i.value = ""); }

    function switchView(v) {
        if(v === 'admin' && !isLogged) { document.getElementById('auth-gate').style.display='flex'; return; }
        document.querySelectorAll('.b-link').forEach(l => l.classList.remove('active'));
        document.getElementById('showroom-tab').style.display = (v === 'showroom' ? 'block' : 'none');
        document.getElementById('admin-tab').style.display = (v === 'admin' ? 'block' : 'none');
        document.getElementById(v === 'showroom' ? 'n-sr' : 'n-ad').classList.add('active');
        if(v === 'admin') renderAdmin();
    }

    function checkAuth() {
        if(document.getElementById('pin-code').value === "1905") { isLogged = true; document.getElementById('auth-gate').style.display='none'; switchView('admin'); }
        else alert("Sai mã PIN!");
    }

    window.onload = initData;
