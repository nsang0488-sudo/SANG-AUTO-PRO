<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANG PRO AUTO - LUXURY SHOWROOM</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/Z6f1Nb9H/image.png">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CSS VARIABLES & RESET
           ========================================= */
        :root {
            --primary: #000000;
            --accent: #e31b23;
            --bg: #f4f6f9;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }

        html, body { 
            overflow-x: hidden; 
            width: 100%;
            font-family: 'Lexend', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 90px; 
            line-height: 1.6; 
            scroll-behavior: smooth;
        }
        
        header { 
            background: var(--primary); 
            color: var(--white); 
            padding: 16px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: var(--shadow-md); 
            width: 100%; 
        }
        .logo-text { 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-align: center; 
            text-transform: uppercase; 
        }

        .container { 
            width: 100%; 
            max-width: 1000px; 
            margin: auto; 
            padding: 0 12px; 
        }

        /* --- STYLE CHO TAB TÍNH LÃI --- */
        .loan-view { display: none; padding-top: 20px; }
        .loan-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .loan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .loan-result-year {
            margin-top: 15px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .loan-result-year h5 { color: var(--accent); margin-bottom: 8px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .loan-result-year p { font-size: 13px; display: flex; justify-content: space-between; margin: 4px 0; }

        /* =========================================
           3. BỘ LỌC SHOWROOM (FILTER)
           ========================================= */
        .filter-section { 
            background: var(--white); 
            padding: 15px; 
            border-radius: var(--radius-lg); 
            margin: 20px 0; 
            box-shadow: var(--shadow-sm); 
            border: 1px solid var(--border);
        }
        .search-wrapper { 
            position: relative; 
            margin-bottom: 12px; 
        }
        .search-wrapper input { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            font-size: 15px; 
            outline: none; 
            transition: all 0.3s; 
            font-family: inherit;
        }
        .search-wrapper i { 
            position: absolute; 
            left: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-sub); 
            font-size: 16px;
        }
        .grid-filters { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
        }
        .sel-custom { 
            padding: 12px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            background: #f8fafc; 
            font-size: 14px; 
            cursor: pointer; 
            width: 100%; 
            font-family: inherit;
            color: var(--text-main);
            outline: none;
        }

        /* =========================================
           4. DANH SÁCH XE (GRID SHOWROOM)
           ========================================= */
        .main-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-top: 15px; 
        }
        .car-card { 
            background: var(--white); 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            border: 1px solid var(--border); 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--shadow-sm);
        }
        .img-wrap { width: 100%; aspect-ratio: 4/3; background: #e2e8f0; overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .info-wrap { padding: 12px; flex: 1; }
        .price-txt { font-size: 16px; font-weight: 700; color: var(--accent); }
        .spec-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag-item { background: #f8fafc; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--text-sub); border: 1px solid var(--border); }

        /* =========================================
           5. TRANG CHI TIẾT & ADMIN (GIỮ NGUYÊN)
           ========================================= */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .close-circle { position: fixed; top: 15px; right: 15px; z-index: 2100; background: rgba(0,0,0,0.6); color: #fff; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        .admin-view { display: none; padding-top: 20px; }
        .form-luxury { background: #fff; padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); margin-bottom: 30px; }
        
        /* =========================================
           6. BOTTOM NAVIGATION (THÊM TAB MỚI)
           ========================================= */
        .b-nav { 
            position: fixed; 
            bottom: 0; left: 0; 
            width: 100%; height: 70px; 
            background: #fff; 
            display: flex; 
            border-top: 1px solid var(--border); 
            z-index: 1000; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
        .b-link { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 11px; 
            cursor: pointer; 
        }
        .b-link.active { color: var(--accent); font-weight: 700; }
        .b-link i { font-size: 22px; margin-bottom: 4px; }

        #auth-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<header>
    <div class="logo-text">SANG PRO AUTO</div>
</header>

<div id="showroom-tab" class="container">
    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="sr-search" placeholder="Tìm kiếm tên xe..." onkeyup="processFilter()">
        </div>
        <div class="grid-filters">
            <select id="f-brand" class="sel-custom" onchange="processFilter()"><option value="">Tất cả Hãng xe</option></select>
            <select id="f-year" class="sel-custom" onchange="processFilter()"><option value="">Năm SX</option></select>
            <select id="f-price" class="sel-custom" onchange="processFilter()">
                <option value="">Khoảng giá</option>
                <option value="0-500">Dưới 500 Tr</option>
                <option value="500-1000">500 Tr - 1 Tỷ</option>
                <option value="1000-9999">Trên 1 Tỷ</option>
            </select>
            <button onclick="location.reload()" class="sel-custom" style="background:var(--primary); color:#fff; border:none;">Tải lại</button>
        </div>
    </div>
    <div class="main-grid" id="showroom-render"></div>
</div>

<div id="loan-tab" class="container loan-view">
    <div class="loan-card">
        <h3 style="text-align: center; margin-bottom: 20px;"><i class="fa-solid fa-calculator"></i> DỰ TÍNH LÃI SUẤT VAY</h3>
        
        <div class="loan-grid">
            <div style="grid-column: span 2;">
                <label style="font-size: 12px; font-weight: 600;">Số tiền vay (VNĐ):</label>
                <input type="number" id="l-amount" class="sel-custom" placeholder="Ví dụ: 400000000">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: 600;">Thời hạn (Năm):</label>
                <input type="number" id="l-years" class="sel-custom" placeholder="Ví dụ: 5" value="5">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: 600;">Lãi suất (%/Năm):</label>
                <input type="number" id="l-rate" class="sel-custom" placeholder="Ví dụ: 8.5" value="8.9">
            </div>
        </div>

        <button onclick="calculateLoan()" style="width:100%; background:var(--accent); color:#fff; padding:15px; border:none; border-radius:12px; font-weight:700; margin-top:20px; cursor:pointer;">XEM KẾT QUẢ DỰ TÍNH</button>

        <div id="loan-result-area" style="margin-top:20px;">
            <p style="text-align:center; color:gray; font-size:13px;">Nhập thông tin và bấm nút để xem bảng tính chi tiết hàng tháng.</p>
        </div>
    </div>
</div>

<div id="admin-tab" class="container admin-view">
    <div class="form-luxury">
        <h3 id="ad-title" style="margin-bottom:20px; font-size:16px; border-left:4px solid var(--primary); padding-left:10px;">ĐĂNG XE MỚI</h3>
        <input type="hidden" id="edit-id">
        <div class="grid-filters">
            <input type="text" id="ad-name" placeholder="Tên xe" class="sel-custom" style="grid-column: span 2;">
            <input type="number" id="ad-price" placeholder="Giá bán" class="sel-custom">
            <input type="text" id="ad-brand" placeholder="Hãng" class="sel-custom">
            <input type="number" id="ad-year" placeholder="Năm SX" class="sel-custom">
            <input type="number" id="ad-odo" placeholder="Số Km" class="sel-custom">
        </div>
        <textarea id="ad-desc" placeholder="Mô tả chi tiết..." class="sel-custom" style="height:100px; margin-top:15px;"></textarea>
        <div style="margin-top:15px;">
            <input type="file" id="ad-files" multiple accept="image/*" class="sel-custom">
        </div>
        <button onclick="saveCar()" id="btn-submit" style="width:100%; background:var(--primary); color:#fff; padding:15px; border:none; border-radius:12px; font-weight:700; margin-top:15px;">CẬP NHẬT KHO XE</button>
    </div>
    <div id="admin-render"></div>
</div>

<div id="detail-overlay" class="full-page">
    <button class="close-circle" onclick="closePage()"><i class="fa-solid fa-xmark"></i></button>
    <div id="detail-render-box"></div>
</div>

<div id="auth-gate">
    <div style="background: #fff; padding: 30px; border-radius: 20px; text-align: center; color: var(--text-main); width: 90%; max-width: 320px;">
        <h3>MÃ PIN ADMIN</h3>
        <input type="password" id="pin-code" style="font-size:30px; text-align:center; width:100%; margin:20px 0; padding:10px; border-radius:10px; border:1px solid #ccc;" maxlength="4">
        <button onclick="checkAuth()" style="background:var(--primary); color:#fff; padding:15px; width:100%; border:none; border-radius:10px; font-weight:700;">ĐĂNG NHẬP</button>
    </div>
</div>

<nav class="b-nav">
    <div class="b-link active" id="n-sr" onclick="switchView('showroom')">
        <i class="fa-solid fa-car-side"></i><span>Showroom</span>
    </div>
    <div class="b-link" id="n-loan" onclick="switchView('loan')">
        <i class="fa-solid fa-calculator"></i><span>Tính lãi</span>
    </div>
    <div class="b-link" id="n-ad" onclick="switchView('admin')">
        <i class="fa-solid fa-toolbox"></i><span>Cửa hàng</span>
    </div>
</nav>

<script>
    /* 1. LOGIC TÍNH LÃI */
    function calculateLoan() {
        const amount = document.getElementById('l-amount').value;
        const years = document.getElementById('l-years').value;
        const rate = document.getElementById('l-rate').value;

        if (!amount || !years || !rate) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

        const loanAmount = parseFloat(amount);
        const totalMonths = parseInt(years) * 12;
        const monthlyRate = (parseFloat(rate) / 100) / 12;

        let remaining = loanAmount;
        const principalPerMonth = loanAmount / totalMonths;
        let html = `<div style="padding-bottom:10px; border-bottom:2px solid #eee; margin-bottom:15px;">
                        <b style="font-size:16px;">Bảng dự tính (Dư nợ giảm dần):</b>
                    </div>`;

        for (let y = 1; y <= years; y++) {
            let maxM = 0, minM = 0, sumY = 0;
            for (let m = 1; m <= 12; m++) {
                let interest = remaining * monthlyRate;
                let total = principalPerMonth + interest;
                if (m === 1) maxM = total;
                if (m === 12) minM = total;
                sumY += total;
                remaining -= principalPerMonth;
            }
            html += `<div class="loan-result-year">
                        <h5>Năm thứ ${y}</h5>
                        <p>Tháng đầu năm: <b>${Math.round(maxM).toLocaleString()}đ</b></p>
                        <p>Tháng cuối năm: <b>${Math.round(minM).toLocaleString()}đ</b></p>
                        <p style="color:var(--accent); font-weight:700; border-top:1px dashed #ccc; padding-top:5px; margin-top:5px;">
                            Trung bình tháng: <span>${Math.round(sumY/12).toLocaleString()}đ</span>
                        </p>
                    </div>`;
        }
        document.getElementById('loan-result-area').innerHTML = html;
    }

    /* 2. CHUYỂN TAB (NAVIGATION) */
    function switchView(v) {
        if(v === 'admin' && !isLogged) { 
            document.getElementById('auth-gate').style.display='flex'; 
            return; 
        }
        
        // Ẩn tất cả tab
        document.getElementById('showroom-tab').style.display = 'none';
        document.getElementById('loan-tab').style.display = 'none';
        document.getElementById('admin-tab').style.display = 'none';
        
        // Hiện tab được chọn
        document.getElementById(v + '-tab').style.display = 'block';
        
        // Cập nhật trạng thái nút bấm
        document.querySelectorAll('.b-link').forEach(l => l.classList.remove('active'));
        document.getElementById('n-' + (v === 'showroom' ? 'sr' : v)).classList.add('active');
        
        if(v === 'admin') renderAdmin();
        window.scrollTo(0,0);
    }

    /* =========================================
       PHẦN GIỮ NGUYÊN LOGIC CŨ CỦA BẠN
       ========================================= */
    const firebaseConfig = {
        apiKey: "AIzaSyA0oquSskSYpyQusTZMFiqTLIE9jZcEaTY",
        authDomain: "sang-pro-ab41f.firebaseapp.com",
        projectId: "sang-pro-ab41f",
        storageBucket: "sang-pro-ab41f.firebasestorage.app",
        messagingSenderId: "332384180945",
        appId: "1:332384180945:web:999a85760a1909850c83f0"
    };
    const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCars = [];
    let isLogged = false;

    function initData() {
        db.collection("Cars").orderBy("updatedAt", "desc").onSnapshot(snap => {
            allCars = [];
            snap.forEach(doc => allCars.push({id: doc.id, ...doc.data()}));
            populateFilters();
            processFilter();
        });
    }

    function populateFilters() {
        const bSet = [...new Set(allCars.map(c => c.brand).filter(Boolean))].sort();
        const bSel = document.getElementById('f-brand');
        bSel.innerHTML = '<option value="">Tất cả Hãng xe</option>';
        bSet.forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
    }

    function processFilter() {
        const kw = document.getElementById('sr-search').value.toLowerCase();
        const filtered = allCars.filter(c => (c.name || '').toLowerCase().includes(kw));
        const r = document.getElementById('showroom-render'); 
        r.innerHTML = "";
        filtered.forEach(c => {
            const thumb = (c.images && c.images[0]) || 'https://via.placeholder.com/400x300';
            r.innerHTML += `
                <div class="car-card" onclick="openPage('${c.id}')">
                    <div class="img-wrap"><img src="${thumb}"></div>
                    <div class="info-wrap">
                        <div style="font-size:14px; font-weight:600; height:40px; overflow:hidden;">${c.name}</div>
                        <div class="price-txt">${(c.price || 0).toLocaleString()} đ</div>
                        <div class="spec-tags">
                            <div class="tag-item">${c.year || '--'}</div>
                            <div class="tag-item">${(c.odo || 0).toLocaleString()} km</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openPage(id) {
        const c = allCars.find(x => x.id === id);
        if(!c) return;
        document.getElementById('detail-render-box').innerHTML = `
            <div style="background:#000; aspect-ratio:4/3;"><img src="${c.images ? c.images[0] : ''}" style="width:100%; height:100%; object-fit:contain;"></div>
            <div style="padding:20px; background:#fff;">
                <h2>${c.name}</h2>
                <h3 style="color:var(--accent);">${(c.price || 0).toLocaleString()} đ</h3>
                <p style="margin-top:20px; white-space:pre-line;">${c.desc || ''}</p>
                <div style="margin-top:30px; display:flex; gap:10px;">
                    <a href="tel:0946327164" style="flex:1; background:#000; color:#fff; text-align:center; padding:15px; border-radius:10px; text-decoration:none; font-weight:700;">GỌI NGAY</a>
                    <a href="https://zalo.me/0946327164" style="flex:1; background:#0068ff; color:#fff; text-align:center; padding:15px; border-radius:10px; text-decoration:none; font-weight:700;">ZALO</a>
                </div>
            </div>`;
        document.getElementById('detail-overlay').style.display = 'block';
    }

    function closePage() { document.getElementById('detail-overlay').style.display = 'none'; }

    function checkAuth() {
        if(document.getElementById('pin-code').value === "1905") { 
            isLogged = true; 
            document.getElementById('auth-gate').style.display='none'; 
            switchView('admin');
        } else { alert("Sai mã PIN!"); }
    }

    // Các hàm phụ trợ khác (nén ảnh, lưu xe...) giữ nguyên logic của bạn
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = (img.height / img.width) * 800;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(b => resolve(new File([b], file.name, {type:'image/jpeg'})), 'image/jpeg', 0.8);
                };
            };
        });
    }

    async function saveCar() {
        const btn = document.getElementById('btn-submit');
        const files = document.getElementById('ad-files').files;
        btn.innerText = "ĐANG TẢI..."; btn.disabled = true;

        let urls = [];
        for(let f of files) {
            const compressed = await compressImage(f);
            const fd = new FormData(); fd.append("image", compressed);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd}).then(r => r.json());
            if(res.data) urls.push(res.data.url);
        }

        const data = {
            name: document.getElementById('ad-name').value,
            price: Number(document.getElementById('ad-price').value),
            brand: document.getElementById('ad-brand').value,
            year: document.getElementById('ad-year').value,
            odo: document.getElementById('ad-odo').value,
            desc: document.getElementById('ad-desc').value,
            images: urls,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("Cars").add(data);
        alert("Đã thêm xe!");
        location.reload();
    }

    window.onload = initData;
</script>
</body>
</html>
