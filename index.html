<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANG PRO AUTO - LUXURY SHOWROOM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --accent: #e31b23;
            --bg: #f2f4f7;
            --white: #ffffff;
            --border: #dee2e6;
            --text-main: #1c1e21;
            --text-sub: #606770;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        /* --- SỬA LỖI TRÀN VIỀN --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            overflow-x: hidden; /* Chống cuộn ngang tuyệt đối */
            width: 100%;
            margin: 0;
            padding: 0;
        }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 90px; line-height: 1.6; }
        
        header { background: var(--primary); color: var(--white); padding: 15px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; }
        .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 2px; text-align: center; text-transform: uppercase; }

        .container { width: 100%; max-width: 1000px; margin: auto; padding: 0 10px; }

        /* BỘ LỌC SHOWROOM */
        .filter-section { background: var(--white); padding: 12px; border-radius: 16px; margin: 15px 0; box-shadow: var(--shadow); }
        .search-wrapper { position: relative; margin-bottom: 12px; }
        .search-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; outline: none; transition: 0.3s; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        
        /* Fix tràn hàng lọc */
        .grid-filters { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .sel-custom { 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #f9fafb; 
            font-size: 13px; 
            cursor: pointer; 
            width: 100%; 
            max-width: 100%; /* Chống tràn */
        }

        /* DANH SÁCH XE */
        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        @media (max-width: 350px) { .main-grid { grid-template-columns: 1fr; } }
        
        .car-card { background: var(--white); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); transition: all 0.3s ease; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .car-card:active { transform: scale(0.97); }
        
        .hot-label { position: absolute; top: 8px; right: 8px; background: linear-gradient(45deg, #ff9a00, #ff0000); color: #fff; padding: 3px 8px; border-radius: 30px; font-size: 9px; font-weight: 700; z-index: 10; }
        .status-tag { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 30px; font-size: 9px; font-weight: 700; color: #fff; z-index: 10; text-transform: uppercase; }

        .img-wrap { width: 100%; aspect-ratio: 4/3; background: #ececec; overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .info-wrap { padding: 10px; flex: 1; display: flex; flex-direction: column; }
        .name-txt { font-size: 13px; font-weight: 600; color: #1a202c; margin-bottom: 5px; height: 38px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .price-txt { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
        .spec-tags { display: flex; flex-wrap: wrap; gap: 4px; border-top: 1px solid #f1f3f5; padding-top: 8px; margin-top: auto; }
        .tag-item { background: #f8f9fa; padding: 2px 5px; border-radius: 4px; font-size: 10px; color: var(--text-sub); display: flex; align-items: center; gap: 3px; }

        /* OVERLAY CHI TIẾT */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .close-circle { position: fixed; top: 15px; right: 15px; z-index: 2100; background: rgba(0,0,0,0.5); color: #fff; width: 36px; height: 36px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; }
        
        .slider-container { width: 100%; aspect-ratio: 16/10; background: #000; position: relative; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; }
        .slide-img { min-width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .slider-nav { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: 0.3s; }
        .dot.active { background: #fff; width: 15px; border-radius: 10px; }

        .detail-body { width: 100%; max-width: 800px; margin: -25px auto 0; position: relative; z-index: 5; padding: 0 10px 100px; }
        .main-info-card { background: #fff; padding: 15px; border-radius: 20px; box-shadow: var(--shadow); }
        .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 15px 0; }
        .f-item { background: #f8f9fa; padding: 8px 4px; border-radius: 10px; text-align: center; }
        .f-item i { display: block; font-size: 14px; margin-bottom: 4px; color: var(--primary); }
        .f-item span { font-size: 8px; color: var(--text-sub); display: block; text-transform: uppercase; }
        .f-item b { font-size: 11px; display: block; }

        .bank-luxury { background: #fff8f8; border: 1px solid #ffe3e3; padding: 12px; border-radius: 12px; margin: 15px 0; border-left: 4px solid var(--accent); }
        
        .contact-group { display: flex; gap: 10px; margin-top: 25px; position: fixed; bottom: 15px; left: 10px; right: 10px; z-index: 100; }
        .c-btn { flex: 1; padding: 12px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .zalo-bg { background: #0068ff; color: #fff; }
        .call-bg { background: var(--primary); color: #fff; }

        /* QUẢN LÝ / ADMIN - SỬA LỖI TRÀN INPUT */
        .admin-view { display: none; padding-top: 15px; width: 100%; }
        .form-luxury { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .admin-item { background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 12px; display: flex; gap: 10px; align-items: center; border: 1px solid #eee; }
        .ad-thumb { width: 70px; height: 55px; object-fit: cover; border-radius: 8px; }
        .ad-actions { display: flex; gap: 5px; margin-top: 5px; }
        .ad-btn { padding: 4px 6px; border-radius: 5px; border: 1px solid #ddd; font-size: 10px; cursor: pointer; background: #fff; }

        /* BOTTOM NAV */
        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .b-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; text-decoration: none; font-size: 10px; cursor: pointer; }
        .b-link.active { color: var(--primary); font-weight: 600; }
        .b-link i { font-size: 18px; margin-bottom: 2px; }

        #auth-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }

        @media (min-width: 600px) {
            .main-grid { grid-template-columns: repeat(3, 1fr); }
            .grid-filters { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<header><div class="logo-text">SANG PRO AUTO</div></header>

<div id="showroom-tab" class="container">
    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="sr-search" placeholder="Tìm Mazda 3, CX5..." onkeyup="processFilter()">
        </div>
        <div class="grid-filters">
            <select id="f-brand" class="sel-custom" onchange="processFilter()"><option value="">Hãng xe</option></select>
            <select id="f-year" class="sel-custom" onchange="processFilter()"><option value="">Năm SX</option></select>
            <select id="f-price" class="sel-custom" onchange="processFilter()">
                <option value="">Khoảng giá</option>
                <option value="0-500">Dưới 500Tr</option>
                <option value="500-1000">500Tr - 1 Tỷ</option>
                <option value="1000-9999">Trên 1 Tỷ</option>
            </select>
            <button onclick="location.reload()" class="sel-custom" style="background:#000; color:#fff; border:none;">Tải lại</button>
        </div>
    </div>
    <div class="main-grid" id="showroom-render"></div>
</div>

<div id="admin-tab" class="container admin-view">
    <div class="form-luxury">
        <h3 id="ad-title" style="margin:0 0 15px 0; font-size: 15px; border-left: 4px solid #000; padding-left: 10px;">ĐĂNG XE MỚI</h3>
        <input type="hidden" id="edit-id">
        <div class="grid-filters">
            <input type="text" id="ad-name" placeholder="Tên xe" class="sel-custom" style="grid-column: span 2;">
            <input type="number" id="ad-price" placeholder="Giá (VNĐ)" class="sel-custom">
            <input type="text" id="ad-brand" placeholder="Hãng" class="sel-custom">
            <input type="number" id="ad-year" placeholder="Năm SX" class="sel-custom">
            <input type="number" id="ad-odo" placeholder="Số Km" class="sel-custom">
            <select id="ad-status" class="sel-custom" style="grid-column: span 2;">
                <option value="available">Đang bán</option>
                <option value="deposit">Đã nhận cọc</option>
                <option value="sold">Đã bán</option>
            </select>
        </div>
        <div class="grid-filters" style="margin-top:10px;">
            <input type="number" id="ad-bankp" placeholder="Vay %" class="sel-custom">
            <input type="number" id="ad-banky" placeholder="Năm vay" class="sel-custom">
            <input type="number" id="ad-bankmin" placeholder="Trả trước" class="sel-custom" style="grid-column: span 2;">
        </div>
        <label style="display:flex; align-items:center; gap:8px; font-weight:600; font-size:12px; margin: 12px 0;">
            <input type="checkbox" id="ad-hot" style="width:18px; height:18px;"> ƯU TIÊN XE HOT 🔥
        </label>
        <textarea id="ad-desc" placeholder="Mô tả xe & Cam kết..." class="sel-custom" style="height:80px; margin-bottom:10px;"></textarea>
        <div style="margin-bottom:15px;">
            <label style="font-size:12px; font-weight:600;">Hình ảnh (Chọn nhiều):</label>
            <input type="file" id="ad-files" multiple class="sel-custom" style="margin-top:5px; padding: 5px;">
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="saveCar()" id="btn-submit" style="flex:2; background:#000; color:#fff; padding:12px; border:none; border-radius:10px; font-weight:700;">CẬP NHẬT</button>
            <button onclick="clearForm()" style="flex:1; background:#f1f3f5; border:none; border-radius:10px;">RESET</button>
        </div>
    </div>

    <h3 style="font-size: 14px; margin: 15px 0 10px;">QUẢN LÝ KHO</h3>
    <input type="text" id="ad-quick-search" placeholder="Tìm nhanh..." class="sel-custom" style="margin-bottom:15px;" onkeyup="renderAdmin()">
    <div id="admin-render"></div>
</div>

<div id="detail-overlay" class="full-page">
    <button class="close-circle" onclick="closePage()"><i class="fa-solid fa-xmark"></i></button>
    <div id="detail-render-box"></div>
</div>

<div id="auth-gate">
    <i class="fa-solid fa-shield-halved" style="font-size: 40px; margin-bottom:15px;"></i>
    <h3 style="letter-spacing:1px; font-size: 16px;">MÃ PIN TRUY CẬP</h3>
    <input type="password" id="pin-code" style="background:none; border:none; border-bottom:2px solid #fff; color:#fff; font-size:35px; text-align:center; width:150px; outline:none; letter-spacing:10px;" maxlength="4" inputmode="numeric">
    <button onclick="checkAuth()" style="margin-top:30px; background:#fff; color:#000; padding:12px 40px; border:none; border-radius:30px; font-weight:700;">XÁC NHẬN</button>
    <p onclick="location.reload()" style="margin-top:20px; font-size:12px; opacity:0.6;">Thoát</p>
</div>

<nav class="b-nav">
    <div class="b-link active" id="n-sr" onclick="switchView('showroom')"><i class="fa-solid fa-car-side"></i><span>Showroom</span></div>
    <div class="b-link" id="n-ad" onclick="switchView('admin')"><i class="fa-solid fa-toolbox"></i><span>Cửa hàng</span></div>
</nav>

<script>
    // --- GIỮ NGUYÊN TOÀN BỘ LOGIC CỦA BẠN ---
    const firebaseConfig = {
        apiKey: "AIzaSyA0oquSskSYpyQusTZMFiqTLIE9jZcEaTY",
        authDomain: "sang-pro-ab41f.firebaseapp.com",
        projectId: "sang-pro-ab41f",
        storageBucket: "sang-pro-ab41f.firebasestorage.app",
        messagingSenderId: "332384180945",
        appId: "1:332384180945:web:999a85760a1909850c83f0",
        measurementId: "G-VHGV61JJ05"
    };
    const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCars = [];
    let isLogged = false;
    let slideIdx = 0;

    // --- HÀM NÉN ẢNH MỚI THÊM VÀO ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 1200; // Nén ảnh về chiều ngang tối đa 1200px
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7); // Chất lượng 70% (cực nhẹ mà vẫn nét)
                };
            };
        });
    }

    function switchView(v) {
        if(v === 'admin' && !isLogged) { document.getElementById('auth-gate').style.display='flex'; return; }
        document.querySelectorAll('.b-link').forEach(l => l.classList.remove('active'));
        document.getElementById('showroom-tab').style.display = (v === 'showroom' ? 'block' : 'none');
        document.getElementById('admin-tab').style.display = (v === 'admin' ? 'block' : 'none');
        document.getElementById(v === 'showroom' ? 'n-sr' : 'n-ad').classList.add('active');
        if(v === 'admin') renderAdmin();
        window.scrollTo(0,0);
    }

    function checkAuth() {
        if(document.getElementById('pin-code').value === "1905") {
            isLogged = true; document.getElementById('auth-gate').style.display='none'; switchView('admin');
        } else alert("Mã pin không chính xác!");
    }

    async function saveCar() {
        const id = document.getElementById('edit-id').value;
        const btn = document.getElementById('btn-submit');
        const files = document.getElementById('ad-files').files;
        
        btn.disabled = true; btn.innerText = "ĐANG NÉN & TẢI ẢNH...";

        const payload = {
            name: document.getElementById('ad-name').value,
            price: Number(document.getElementById('ad-price').value),
            brand: document.getElementById('ad-brand').value,
            year: document.getElementById('ad-year').value,
            odo: document.getElementById('ad-odo').value,
            status: document.getElementById('ad-status').value,
            bankP: document.getElementById('ad-bankp').value,
            bankY: document.getElementById('ad-banky').value,
            bankMin: document.getElementById('ad-bankmin').value,
            isHot: document.getElementById('ad-hot').checked,
            desc: document.getElementById('ad-desc').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if(files.length > 0) {
                let urls = [];
                for(let f of files) {
                    // Bước nén ảnh trước khi gửi
                    const compressedFile = await compressImage(f);
                    const fd = new FormData(); 
                    fd.append("image", compressedFile);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
                    const d = await r.json(); 
                    if(d.data && d.data.url) urls.push(d.data.url);
                }
                payload.images = urls;
            }

            if(id) { await db.collection("Cars").doc(id).update(payload); }
            else { 
                payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("Cars").add(payload); 
            }
            alert("Đã cập nhật showroom!"); location.reload();
        } catch(e) { alert("Lỗi: " + e.message); btn.disabled = false; btn.innerText = "THỬ LẠI"; }
    }

    function initData() {
        db.collection("Cars").onSnapshot(snap => {
            allCars = [];
            snap.forEach(doc => allCars.push({id: doc.id, ...doc.data()}));
            
            allCars.sort((a,b) => {
                if(a.isHot !== b.isHot) return b.isHot ? -1 : 1;
                return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
            });

            populateFilters();
            processFilter();
            
            const queryId = new URLSearchParams(window.location.search).get('id');
            if(queryId) openPage(queryId);
        });
    }

    function populateFilters() {
        const bSet = [...new Set(allCars.map(c => c.brand))].sort();
        const ySet = [...new Set(allCars.map(c => c.year))].sort((a,b)=>b-a);
        const bSel = document.getElementById('f-brand');
        const ySel = document.getElementById('f-year');
        
        bSel.innerHTML = '<option value="">Hãng xe</option>';
        bSet.forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
        ySel.innerHTML = '<option value="">Năm SX</option>';
        ySet.forEach(y => ySel.innerHTML += `<option value="${y}">${y}</option>`);
    }

    function processFilter() {
        const kw = document.getElementById('sr-search').value.toLowerCase();
        const br = document.getElementById('f-brand').value;
        const ye = document.getElementById('f-year').value;
        const pr = document.getElementById('f-price').value;

        const filtered = allCars.filter(c => {
            const mKw = c.name.toLowerCase().includes(kw);
            const mBr = !br || c.brand === br;
            const mYe = !ye || c.year == ye;
            let mPr = true;
            if(pr === '0-500') mPr = c.price < 500000000;
            if(pr === '500-1000') mPr = c.price >= 500000000 && c.price < 1000000000;
            if(pr === '1000-9999') mPr = c.price >= 1000000000;
            return mKw && mBr && mYe && mPr;
        });

        const r = document.getElementById('showroom-render'); r.innerHTML = "";
        filtered.forEach(c => {
            const stColor = c.status === 'sold' ? '#6c757d' : (c.status === 'deposit' ? '#fd7e14' : 'transparent');
            const stText = c.status === 'sold' ? 'ĐÃ BÁN' : (c.status === 'deposit' ? 'NHẬN CỌC' : '');
            
            r.innerHTML += `
                <div class="car-card" onclick="openPage('${c.id}')">
                    ${c.isHot ? '<div class="hot-label"><i class="fa-solid fa-fire"></i></div>' : ''}
                    <div class="status-tag" style="background:${stColor}">${stText}</div>
                    <div class="img-wrap"><img src="${c.images[0]}" loading="lazy"></div>
                    <div class="info-wrap">
                        <div class="name-txt">${c.name}</div>
                        <div class="price-txt">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                        <div class="spec-tags">
                            <div class="tag-item">${c.year}</div>
                            <div class="tag-item">${new Intl.NumberFormat('vi-VN').format(c.odo)} km</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function renderAdmin() {
        const kw = document.getElementById('ad-quick-search').value.toLowerCase();
        const r = document.getElementById('admin-render'); r.innerHTML = "";
        allCars.filter(c => c.name.toLowerCase().includes(kw)).forEach(c => {
            r.innerHTML += `
                <div class="admin-item">
                    <img src="${c.images[0]}" class="ad-thumb">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:13px;">${c.name}</div>
                        <div style="color:var(--accent); font-weight:700; font-size:13px;">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                        <div class="ad-actions">
                            <button class="ad-btn" style="color:blue" onclick="editMode('${c.id}')">Sửa</button>
                            <button class="ad-btn" onclick="copyShareLink('${c.id}')">Link</button>
                            <button class="ad-btn" style="color:red" onclick="deleteCar('${c.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function editMode(id) {
        const c = allCars.find(x => x.id === id);
        document.getElementById('edit-id').value = c.id;
        document.getElementById('ad-name').value = c.name;
        document.getElementById('ad-price').value = c.price;
        document.getElementById('ad-brand').value = c.brand;
        document.getElementById('ad-year').value = c.year;
        document.getElementById('ad-odo').value = c.odo;
        document.getElementById('ad-status').value = c.status;
        document.getElementById('ad-bankp').value = c.bankP;
        document.getElementById('ad-banky').value = c.bankY;
        document.getElementById('ad-bankmin').value = c.bankMin;
        document.getElementById('ad-hot').checked = c.isHot || false;
        document.getElementById('ad-desc').value = c.desc;
        document.getElementById('ad-title').innerText = "SỬA: " + c.name;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openPage(id) {
        const c = allCars.find(x => x.id === id);
        if(!c) return;
        
        window.history.pushState(null, '', "?id=" + id);
        slideIdx = 0;
        
        let slideHtml = '';
        let dotHtml = '';
        c.images.forEach((img, i) => {
            slideHtml += `<img src="${img}" class="slide-img">`;
            dotHtml += `<div class="dot ${i===0?'active':''}" id="dot-${i}"></div>`;
        });

        document.getElementById('detail-render-box').innerHTML = `
            <div class="slider-container" id="main-slider">
                <div class="slider-track" id="track-box">${slideHtml}</div>
                <div class="slider-nav" id="dot-box">${dotHtml}</div>
            </div>
            <div class="detail-body">
                <div class="main-info-card">
                    <h1 style="margin:0 0 8px 0; font-size:18px;">${c.name}</h1>
                    <div style="font-size:22px; color:var(--accent); font-weight:700;">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                    
                    <div class="feature-grid">
                        <div class="f-item"><i class="fa-solid fa-calendar"></i><span>Năm SX</span><b>${c.year}</b></div>
                        <div class="f-item"><i class="fa-solid fa-gauge-high"></i><span>Đã đi</span><b>${new Intl.NumberFormat('vi-VN').format(c.odo)}</b></div>
                        <div class="f-item"><i class="fa-solid fa-gas-pump"></i><span>Nhiên liệu</span><b>Xăng</b></div>
                    </div>

                    <div class="bank-luxury">
                        <div style="font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:8px; color:#c00; font-size:12px;">
                            <i class="fa-solid fa-building-columns"></i> TRẢ GÓP NGÂN HÀNG
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:8px;">
                            <span>Vay tối đa: <b>${c.bankP}%</b></span>
                            <span>Thời hạn: <b>${c.bankY} năm</b></span>
                        </div>
                        <div style="font-size:13px; font-weight:700;">Trả trước: <span style="color:var(--accent)">${new Intl.NumberFormat('vi-VN').format(c.bankMin)} đ</span></div>
                    </div>

                    <div style="margin-top:15px;">
                        <h4 style="margin:0 0 8px 0; font-size:13px;">Mô tả chi tiết:</h4>
                        <div style="white-space: pre-line; color:#444; font-size:13px; background:#f9f9f9; padding:10px; border-radius:10px; border:1px solid #eee;">${c.desc}</div>
                    </div>
                </div>
            </div>
            <div class="contact-group">
                <a href="tel:0946327164" class="c-btn call-bg"><i class="fa-solid fa-phone"></i> GỌI NGAY</a>
                <a href="https://zalo.me/0946327164" target="_blank" class="c-btn zalo-bg"><i class="fa-solid fa-comment"></i> ZALO CHAT</a>
            </div>`;
        
        document.getElementById('detail-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        setupSwipe();
    }

    function setupSwipe() {
        const track = document.getElementById('track-box');
        if(!track) return;
        let startX = 0;
        let isDragging = false;

        track.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
            track.style.transition = 'none';
        }, {passive: true});

        track.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let currentX = e.touches[0].clientX;
            let diff = currentX - startX;
            let move = -(slideIdx * track.offsetWidth) + diff;
            track.style.transform = `translateX(${move}px)`;
        }, {passive: true});

        track.addEventListener('touchend', (e) => {
            isDragging = false;
            track.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            let diff = e.changedTouches[0].clientX - startX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0 && slideIdx > 0) slideIdx--;
                else if (diff < 0 && slideIdx < track.children.length - 1) slideIdx++;
            }
            updateSlide();
        });
    }

    function updateSlide() {
        const track = document.getElementById('track-box');
        if(!track) return;
        track.style.transform = `translateX(-${slideIdx * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === slideIdx);
        });
    }

    function closePage() {
        document.getElementById('detail-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.history.pushState(null, '', window.location.pathname);
    }

    function clearForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('ad-title').innerText = "ĐĂNG XE MỚI";
        document.querySelectorAll('.form-luxury input:not([type=checkbox]), .form-luxury textarea').forEach(i => i.value = "");
        document.getElementById('ad-hot').checked = false;
    }

    async function deleteCar(id) { if(confirm("Xóa xe này?")) await db.collection("Cars").doc(id).delete(); }
    function copyShareLink(id) {
        const l = window.location.origin + window.location.pathname + "?id=" + id;
        navigator.clipboard.writeText(l); alert("Đã copy link gửi khách!");
    }

    window.onload = initData;
</script>
</body>
</html>
