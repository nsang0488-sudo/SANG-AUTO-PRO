<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANG PRO AUTO - LUXURY SHOWROOM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --accent: #e31b23;
            --bg: #f2f4f7;
            --white: #ffffff;
            --border: #dee2e6;
            --text-main: #1c1e21;
            --text-sub: #606770;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        body { font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 100px; line-height: 1.6; }
        header { background: var(--primary); color: var(--white); padding: 22px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 3px; text-align: center; text-transform: uppercase; }

        .container { max-width: 1000px; margin: auto; padding: 0 15px; }

        /* BỘ LỌC SHOWROOM */
        .filter-section { background: var(--white); padding: 20px; border-radius: 16px; margin: 20px 0; box-shadow: var(--shadow); }
        .search-wrapper { position: relative; margin-bottom: 15px; }
        .search-wrapper input { width: 100%; padding: 14px 45px; border-radius: 12px; border: 1px solid var(--border); font-size: 15px; outline: none; transition: 0.3s; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        
        .grid-filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .sel-custom { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #f9fafb; font-size: 14px; cursor: pointer; }

        /* DANH SÁCH XE */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; margin-top: 25px; }
        .car-card { background: var(--white); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; position: relative; }
        .car-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.12); border-color: var(--primary); }
        
        .hot-label { position: absolute; top: 12px; right: 12px; background: linear-gradient(45deg, #ff9a00, #ff0000); color: #fff; padding: 5px 12px; border-radius: 30px; font-size: 10px; font-weight: 700; z-index: 10; box-shadow: 0 4px 10px rgba(255,0,0,0.3); }
        .status-tag { position: absolute; top: 12px; left: 12px; padding: 5px 12px; border-radius: 30px; font-size: 10px; font-weight: 700; color: #fff; z-index: 10; text-transform: uppercase; }

        .img-wrap { width: 100%; height: 210px; background: #ececec; overflow: hidden; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .car-card:hover .img-wrap img { transform: scale(1.08); }

        .info-wrap { padding: 18px; }
        .name-txt { font-size: 17px; font-weight: 600; color: #1a202c; margin-bottom: 8px; height: 48px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-txt { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 15px; }
        .spec-tags { display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #f1f3f5; padding-top: 15px; }
        .tag-item { background: #f8f9fa; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 5px; }
        .tag-item i { color: var(--primary); font-size: 11px; }

        /* OVERLAY CHI TIẾT PREMIUM */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; overflow-x: hidden; }
        .close-circle { position: fixed; top: 20px; right: 20px; z-index: 2100; background: rgba(0,0,0,0.7); color: #fff; width: 44px; height: 44px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; backdrop-filter: blur(5px); }
        
        /* Slider mượt mà */
        .slider-container { width: 100%; height: 400px; background: #000; position: relative; overflow: hidden; }
        .slider-track { display: flex; height: 100%; transition: transform 0.4s ease-out; }
        .slide-img { min-width: 100%; height: 100%; object-fit: contain; }
        .slider-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); }
        .dot.active { background: #fff; width: 20px; border-radius: 10px; }

        .detail-body { max-width: 800px; margin: -40px auto 0; position: relative; z-index: 5; padding: 0 15px; }
        .main-info-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: var(--shadow); }
        .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; text-align: center; }
        .f-item { background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .f-item i { display: block; font-size: 20px; margin-bottom: 8px; color: var(--primary); }
        .f-item span { font-size: 11px; color: var(--text-sub); display: block; }
        .f-item b { font-size: 14px; }

        .bank-luxury { background: linear-gradient(135deg, #fff5f5 0%, #fff 100%); border: 1px solid #ffe3e3; padding: 20px; border-radius: 16px; margin: 20px 0; border-left: 6px solid var(--accent); }
        
        .contact-group { display: flex; gap: 12px; margin-top: 30px; position: sticky; bottom: 20px; background: rgba(242, 244, 247, 0.8); backdrop-filter: blur(10px); padding: 10px; border-radius: 15px; }
        .c-btn { flex: 1; padding: 16px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 16px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .zalo-bg { background: #0068ff; color: #fff; }
        .call-bg { background: var(--primary); color: #fff; }

        /* CỬA HÀNG / QUẢN LÝ */
        .admin-view { display: none; padding-top: 25px; }
        .form-luxury { background: #fff; border: 1px solid #000; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 30px; }
        .admin-item { background: #fff; padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; gap: 18px; align-items: center; border: 1px solid #eee; }
        .ad-thumb { width: 120px; height: 90px; object-fit: cover; border-radius: 10px; }
        .ad-actions { display: flex; gap: 8px; margin-top: 10px; }
        .ad-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; background: #fff; }

        /* BOTTOM NAV */
        .b-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .b-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #adb5bd; text-decoration: none; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .b-link.active { color: var(--primary); font-weight: 600; }
        .b-link i { font-size: 24px; margin-bottom: 4px; }

        #auth-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }

        @media (max-width: 600px) {
            .grid-filters { grid-template-columns: 1fr 1fr; }
            .slider-container { height: 260px; }
            .feature-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header><div class="logo-text">SANG PRO AUTO</div></header>

<div id="showroom-tab" class="container">
    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="sr-search" placeholder="Tìm tên xe, ví dụ: Mazda 3..." onkeyup="processFilter()">
        </div>
        <div class="grid-filters">
            <select id="f-brand" class="sel-custom" onchange="processFilter()"><option value="">Hãng xe</option></select>
            <select id="f-year" class="sel-custom" onchange="processFilter()"><option value="">Năm SX</option></select>
            <select id="f-price" class="sel-custom" onchange="processFilter()">
                <option value="">Khoảng giá</option>
                <option value="0-500">Dưới 500Tr</option>
                <option value="500-1000">500Tr - 1 Tỷ</option>
                <option value="1000-9999">Trên 1 Tỷ</option>
            </select>
        </div>
    </div>
    <div class="main-grid" id="showroom-render"></div>
</div>

<div id="admin-tab" class="container admin-view">
    <div class="form-luxury">
        <h3 id="ad-title" style="margin-top:0; border-bottom: 2px solid #000; display:inline-block; padding-bottom:5px;">ĐĂNG XE MỚI</h3>
        <input type="hidden" id="edit-id">
        <div class="grid-filters" style="margin-top:20px;">
            <input type="text" id="ad-name" placeholder="Tên xe đầy đủ" class="sel-custom">
            <input type="number" id="ad-price" placeholder="Giá bán (VNĐ)" class="sel-custom">
            <input type="text" id="ad-brand" placeholder="Hãng xe" class="sel-custom">
            <input type="number" id="ad-year" placeholder="Năm sản xuất" class="sel-custom">
            <input type="number" id="ad-odo" placeholder="Số Km đã đi" class="sel-custom">
            <select id="ad-status" class="sel-custom">
                <option value="available">Đang bán</option>
                <option value="deposit">Đã nhận cọc</option>
                <option value="sold">Đã bán</option>
            </select>
        </div>
        <div class="grid-filters" style="margin-top:15px;">
            <input type="number" id="ad-bankp" placeholder="Vay tối đa (%)" class="sel-custom">
            <input type="number" id="ad-banky" placeholder="Thời hạn vay (Năm)" class="sel-custom">
            <input type="number" id="ad-bankmin" placeholder="Trả trước tối thiểu" class="sel-custom">
            <label style="display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; cursor:pointer;">
                <input type="checkbox" id="ad-hot" style="width:20px; height:20px;"> ƯU TIÊN XE HOT 🔥
            </label>
        </div>
        <textarea id="ad-desc" placeholder="Mô tả tình trạng xe, cam kết..." class="sel-custom" style="margin-top:15px; height:120px;"></textarea>
        <div style="margin-top:15px;">
            <label style="font-size:13px; font-weight:600;">Hình ảnh xe (Chọn nhiều ảnh cùng lúc):</label>
            <input type="file" id="ad-files" multiple class="sel-custom" style="margin-top:5px;">
        </div>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button onclick="saveCar()" id="btn-submit" style="flex:2; background:#000; color:#fff; padding:18px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">CẬP NHẬT LÊN SHOWROOM</button>
            <button onclick="clearForm()" style="flex:1; background:#f1f3f5; border:none; border-radius:12px; cursor:pointer;">LÀM MỚI</button>
        </div>
    </div>

    <h3 style="margin-bottom:20px;">QUẢN LÝ KHO HÀNG (${allCars.length} XE)</h3>
    <input type="text" id="ad-quick-search" placeholder="Tìm nhanh xe trong kho..." class="sel-custom" style="width:100%; margin-bottom:20px;" onkeyup="renderAdmin()">
    <div id="admin-render"></div>
</div>

<div id="detail-overlay" class="full-page">
    <button class="close-circle" onclick="closePage()">&times;</button>
    <div id="detail-render-box"></div>
</div>

<div id="auth-gate">
    <i class="fa-solid fa-shield-halved" style="font-size: 50px; margin-bottom:20px;"></i>
    <h3 style="letter-spacing:2px;">TRUY CẬP QUẢN TRỊ</h3>
    <input type="password" id="pin-code" style="background:none; border:none; border-bottom:3px solid #fff; color:#fff; font-size:40px; text-align:center; width:180px; outline:none; letter-spacing:8px;" maxlength="4">
    <button onclick="checkAuth()" style="margin-top:35px; background:#fff; color:#000; padding:15px 50px; border:none; border-radius:35px; font-weight:700; cursor:pointer;">ĐĂNG NHẬP</button>
    <p onclick="location.reload()" style="margin-top:25px; font-size:13px; opacity:0.6; cursor:pointer;">Quay lại Showroom</p>
</div>

<nav class="b-nav">
    <div class="b-link active" id="n-sr" onclick="switchView('showroom')"><i class="fa-solid fa-car-side"></i><span>Showrooms</span></div>
    <div class="b-link" id="n-ad" onclick="switchView('admin')"><i class="fa-solid fa-shop"></i><span>Cửa hàng</span></div>
</nav>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyA0oquSskSYpyQusTZMFiqTLIE9jZcEaTY",
        authDomain: "sang-pro-ab41f.firebaseapp.com",
        projectId: "sang-pro-ab41f",
        storageBucket: "sang-pro-ab41f.firebasestorage.app",
        messagingSenderId: "332384180945",
        appId: "1:332384180945:web:999a85760a1909850c83f0",
        measurementId: "G-VHGV61JJ05"
    };
    const IMGBB_KEY = "a4b55574ff83037588382d5f83783ea1";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCars = [];
    let isLogged = false;
    let slideIdx = 0;

    // --- LOGIC GIAO DIỆN ---
    function switchView(v) {
        if(v === 'admin' && !isLogged) { document.getElementById('auth-gate').style.display='flex'; return; }
        document.querySelectorAll('.b-link').forEach(l => l.classList.remove('active'));
        document.getElementById('showroom-tab').style.display = (v === 'showroom' ? 'block' : 'none');
        document.getElementById('admin-tab').style.display = (v === 'admin' ? 'block' : 'none');
        document.getElementById(v === 'showroom' ? 'n-sr' : 'n-ad').classList.add('active');
        if(v === 'admin') renderAdmin();
    }

    function checkAuth() {
        if(document.getElementById('pin-code').value === "1905") {
            isLogged = true; document.getElementById('auth-gate').style.display='none'; switchView('admin');
        } else alert("Mã pin không chính xác!");
    }

    // --- XỬ LÝ DỮ LIỆU ---
    async function saveCar() {
        const id = document.getElementById('edit-id').value;
        const btn = document.getElementById('btn-submit');
        const files = document.getElementById('ad-files').files;
        
        btn.disabled = true; btn.innerText = "ĐANG XỬ LÝ DỮ LIỆU...";

        const payload = {
            name: document.getElementById('ad-name').value,
            price: Number(document.getElementById('ad-price').value),
            brand: document.getElementById('ad-brand').value,
            year: document.getElementById('ad-year').value,
            odo: document.getElementById('ad-odo').value,
            status: document.getElementById('ad-status').value,
            bankP: document.getElementById('ad-bankp').value,
            bankY: document.getElementById('ad-banky').value,
            bankMin: document.getElementById('ad-bankmin').value,
            isHot: document.getElementById('ad-hot').checked,
            desc: document.getElementById('ad-desc').value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if(files.length > 0) {
                let urls = [];
                for(let f of files) {
                    const fd = new FormData(); fd.append("image", f);
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
                    const d = await r.json(); urls.push(d.data.url);
                }
                payload.images = urls;
            }

            if(id) { await db.collection("Cars").doc(id).update(payload); }
            else { 
                payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("Cars").add(payload); 
            }
            alert("Thao tác thành công!"); location.reload();
        } catch(e) { alert("Lỗi: " + e.message); btn.disabled = false; }
    }

    function initData() {
        db.collection("Cars").onSnapshot(snap => {
            allCars = [];
            snap.forEach(doc => allCars.push({id: doc.id, ...doc.data()}));
            
            // Sắp xếp: Ưu tiên Hot -> Thời gian mới nhất
            allCars.sort((a,b) => {
                if(a.isHot !== b.isHot) return b.isHot ? 1 : -1;
                return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
            });

            populateFilters();
            processFilter();
            
            // Link chia sẻ chuẩn
            const queryId = new URLSearchParams(window.location.search).get('id');
            if(queryId) openPage(queryId);
        });
    }

    function populateFilters() {
        const bSet = [...new Set(allCars.map(c => c.brand))].sort();
        const ySet = [...new Set(allCars.map(c => c.year))].sort((a,b)=>b-a);
        
        const bSel = document.getElementById('f-brand');
        const ySel = document.getElementById('f-year');
        
        bSel.innerHTML = '<option value="">Hãng xe</option>';
        bSet.forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
        ySel.innerHTML = '<option value="">Năm SX</option>';
        ySet.forEach(y => ySel.innerHTML += `<option value="${y}">${y}</option>`);
    }

    function processFilter() {
        const kw = document.getElementById('sr-search').value.toLowerCase();
        const br = document.getElementById('f-brand').value;
        const ye = document.getElementById('f-year').value;
        const pr = document.getElementById('f-price').value;

        const filtered = allCars.filter(c => {
            const mKw = c.name.toLowerCase().includes(kw);
            const mBr = !br || c.brand === br;
            const mYe = !ye || c.year == ye;
            let mPr = true;
            if(pr === '0-500') mPr = c.price < 500000000;
            if(pr === '500-1000') mPr = c.price >= 500000000 && c.price < 1000000000;
            if(pr === '1000-9999') mPr = c.price >= 1000000000;
            return mKw && mBr && mYe && mPr;
        });

        const r = document.getElementById('showroom-render'); r.innerHTML = "";
        filtered.forEach(c => {
            const stColor = c.status === 'sold' ? '#6c757d' : (c.status === 'deposit' ? '#fd7e14' : 'transparent');
            const stText = c.status === 'sold' ? 'ĐÃ BÁN' : (c.status === 'deposit' ? 'NHẬN CỌC' : '');
            
            r.innerHTML += `
                <div class="car-card" onclick="openPage('${c.id}')">
                    ${c.isHot ? '<div class="hot-label"><i class="fa-solid fa-fire"></i> HOT</div>' : ''}
                    <div class="status-tag" style="background:${stColor}">${stText}</div>
                    <div class="img-wrap"><img src="${c.images[0]}"></div>
                    <div class="info-wrap">
                        <div class="name-txt">${c.name}</div>
                        <div class="price-txt">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                        <div class="spec-tags">
                            <div class="tag-item"><i class="fa-solid fa-calendar-day"></i> ${c.year}</div>
                            <div class="tag-item"><i class="fa-solid fa-gauge"></i> ${new Intl.NumberFormat('vi-VN').format(c.odo)} km</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function renderAdmin() {
        const kw = document.getElementById('ad-quick-search').value.toLowerCase();
        const r = document.getElementById('admin-render'); r.innerHTML = "";
        allCars.filter(c => c.name.toLowerCase().includes(kw)).forEach(c => {
            r.innerHTML += `
                <div class="admin-item">
                    <img src="${c.images[0]}" class="ad-thumb">
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:14px;">${c.isHot ? '🔥 ' : ''}${c.name}</div>
                        <div style="color:var(--accent); font-weight:700;">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                        <div class="ad-actions">
                            <button class="ad-btn" style="color:blue" onclick="editMode('${c.id}')"><i class="fa-solid fa-pen"></i> Sửa</button>
                            <button class="ad-btn" onclick="copyShareLink('${c.id}')"><i class="fa-solid fa-link"></i> Link Khách</button>
                            <button class="ad-btn" style="color:red" onclick="deleteCar('${c.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function editMode(id) {
        const c = allCars.find(x => x.id === id);
        document.getElementById('edit-id').value = c.id;
        document.getElementById('ad-name').value = c.name;
        document.getElementById('ad-price').value = c.price;
        document.getElementById('ad-brand').value = c.brand;
        document.getElementById('ad-year').value = c.year;
        document.getElementById('ad-odo').value = c.odo;
        document.getElementById('ad-status').value = c.status;
        document.getElementById('ad-bankp').value = c.bankP;
        document.getElementById('ad-banky').value = c.bankY;
        document.getElementById('ad-bankmin').value = c.bankMin;
        document.getElementById('ad-hot').checked = c.isHot || false;
        document.getElementById('ad-desc').value = c.desc;
        document.getElementById('ad-title').innerText = "CHỈNH SỬA: " + c.name;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // --- CHI TIẾT PREMIUM ---
    function openPage(id) {
        const c = allCars.find(x => x.id === id);
        if(!c) return;
        
        window.history.pushState(null, '', "?id=" + id);
        slideIdx = 0;
        
        let slideHtml = '';
        let dotHtml = '';
        c.images.forEach((img, i) => {
            slideHtml += `<img src="${img}" class="slide-img">`;
            dotHtml += `<div class="dot ${i===0?'active':''}" id="dot-${i}"></div>`;
        });

        document.getElementById('detail-render-box').innerHTML = `
            <div class="slider-container" id="main-slider" 
                 touchstart="startSwipe(event)" 
                 touchmove="moveSwipe(event)" 
                 touchend="endSwipe(event)">
                <div class="slider-track" id="track-box">${slideHtml}</div>
                <div class="slider-nav">${dotHtml}</div>
            </div>
            <div class="detail-body">
                <div class="main-info-card">
                    <h1 style="margin:0 0 10px 0; font-size:24px; line-height:1.3;">${c.name}</h1>
                    <div style="font-size:28px; color:var(--accent); font-weight:700;">${new Intl.NumberFormat('vi-VN').format(c.price)} đ</div>
                    
                    <div class="feature-grid">

                    </div>

                    <div class="bank-luxury">
                        <div style="font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:12px; color:#c00;">

                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:10px;">
                            <span>Vay tối đa: <b>${c.bankP}%</b></span>
                            <span>Thời hạn: <b>${c.bankY} năm</b></span>
                        </div>
                        <div style="font-size:16px; font-weight:700;">Trả trước tối thiểu: <span style="color:var(--accent)">${new Intl.NumberFormat('vi-VN').format(c.bankMin)} đ</span></div>

                        <div style="white-space: pre-line; color:#444; font-size:15px; background:#fcfcfc; padding:15px; border-radius:10px; border:1px dashed #ddd;">${c.desc}</div>
                    </div>

                    <div class="contact-group">
                        <a href="tel:0946327164" class="c-btn call-bg"><i class="fa-solid fa-phone"></i> GỌI ĐIỆN</a>
                        <a href="https://zalo.me/0946327164" target="_blank" class="c-btn zalo-bg"><i class="fa-solid fa-comment"></i> ZALO</a>

                <div style="height:40px;"></div>
            </div>`;
        document.getElementById('detail-overlay').style.display = 'block';
        
        // Hỗ trợ vuốt ảnh bằng tay (Swipe)
        setupSwipe();
    }

    // --- LOGIC SWIPE ẢNH ---
    let startX = 0;
    function setupSwipe() {
        const track = document.getElementById('track-box');
        track.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        track.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if(startX - endX > 50) moveSlide(1);
            if(endX - startX > 50) moveSlide(-1);
        });
    }

    function moveSlide(dir) {
        const c = allCars.find(x => x.id === new URLSearchParams(window.location.search).get('id'));
        slideIdx += dir;
        if(slideIdx < 0) slideIdx = c.images.length - 1;
        if(slideIdx >= c.images.length) slideIdx = 0;
        
        document.getElementById('track-box').style.transform = `translateX(-${slideIdx * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.className = i === slideIdx ? 'dot active' : 'dot';
        });
    }

    function closePage() {
        document.getElementById('detail-overlay').style.display = 'none';
        window.history.pushState(null, '', window.location.pathname);
    }

    function clearForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('ad-title').innerText = "ĐĂNG XE MỚI";
        document.querySelectorAll('.form-luxury input:not([type=checkbox]), .form-luxury textarea').forEach(i => i.value = "");
        document.getElementById('ad-hot').checked = false;
    }

    async function deleteCar(id) { if(confirm("Xóa vĩnh viễn xe này khỏi kho?")) await db.collection("Cars").doc(id).delete(); }
    function copyShareLink(id) {
        const l = window.location.origin + window.location.pathname + "?id=" + id;
        navigator.clipboard.writeText(l); alert("Đã copy link chuẩn. Gửi ngay cho khách qua Zalo!");
    }

    window.onload = initData;
</script>
